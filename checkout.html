<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب | Ecoway Men Products</title>
  <meta name="description" content="أكمل طلبك من Ecoway Men Products — الدفع عند الاستلام وتوصيل لجميع المحافظات.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1C2939">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <h1 class="page-title">إتمام الطلب</h1>

    <div id="order-success" class="order-success hidden">
      <div class="order-success__icon">✓</div>
      <h2>تم إرسال طلبك بنجاح!</h2>
      <p>شكراً لك. سيتواصل معك فريقنا قريباً لتأكيد الطلب. يمكنك متابعة حالة طلبك عبر واتساب.</p>
      <a href="index.html" class="btn btn--primary">العودة للرئيسية</a>
      <a href="https://wa.me/201157563840" class="btn btn--outline mt-16" target="_blank" rel="noopener">تواصل عبر واتساب</a>
    </div>

    <div id="checkout-layout" class="checkout-layout">
      <form id="checkoutForm" class="checkout-form" novalidate>
        <h3>بيانات التوصيل</h3>

        <div class="form-group">
          <label for="customerName">الاسم الكامل <span class="required">*</span></label>
          <input type="text" id="customerName" name="customerName" required autocomplete="name" placeholder="أدخل اسمك الكامل">
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="phone">رقم الهاتف <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="01xxxxxxxxx" dir="ltr">
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="governorate">المحافظة <span class="required">*</span></label>
          <select id="governorate" name="governorate" required>
            <option value="">اختر المحافظة</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="address">العنوان بالتفصيل <span class="required">*</span></label>
          <textarea id="address" name="address" required placeholder="الشارع، المنطقة، أقرب علامة مميزة..." rows="3"></textarea>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="notes">ملاحظات (اختياري)</label>
          <textarea id="notes" name="notes" placeholder="أي ملاحظات إضافية على الطلب..." rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn--primary btn--block btn--lg">تأكيد الطلب</button>
        <p class="shipping-note" style="margin-top: 16px; text-align: center;">
          بالضغط على «تأكيد الطلب» أنت توافق على <a href="shipping-policy.html" style="color: var(--color-accent);">سياسة الشحن</a> و<a href="return-policy.html" style="color: var(--color-accent);">سياسة الاسترجاع</a>.
        </p>
      </form>

      <div class="cart-summary" id="checkout-summary"></div>
    </div>
  </main>

  <div id="site-footer"></div>
  <div id="mobile-bottom-nav"></div>
  <div id="whatsapp-btn"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/checkout-page.js"></script>
</body>
</html>
